<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RSM Presentation Template</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="deck">
      <section class="slide title-slide">
        <p class="eyebrow">RSM</p>
        <h1>Presentation Title</h1>
        <p class="subtitle">Subtitle or presenter information</p>
      </section>

      <section class="slide">
        <h2>Key Message</h2>
        <p>
          Use one strong idea per slide. Keep text lean and prioritize visual
          hierarchy.
        </p>
      </section>

      <section class="slide two-column">
        <div>
          <h2>Column One</h2>
          <ul>
            <li>Point one</li>
            <li>Point two</li>
            <li>Point three</li>
          </ul>
        </div>
        <div>
          <h2>Column Two</h2>
          <p>Use this area for a chart, figure, quote, or supporting detail.</p>
        </div>
      </section>
    </main>
  </body>
</html>
